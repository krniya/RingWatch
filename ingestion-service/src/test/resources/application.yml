spring:
  datasource:
    url: jdbc:h2:mem:ringwatch_ingestion;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092

ringwatch:
  jwt:
    secret: test-only-secret-key-at-least-32-bytes-long-for-hs256
