spring:
  datasource:
    url: jdbc:h2:mem:ringwatch_auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

ringwatch:
  jwt:
    secret: test-only-secret-key-at-least-32-bytes-long-for-hs256
    expiration-ms: 3600000
  admin:
    username: admin
    password: admin-test-password
